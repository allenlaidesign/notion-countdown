<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Marquee Animation */
        .marquee-wrapper { overflow: hidden; white-space: nowrap; width: 100%; display: flex; align-items: center; position: relative; }
        .marquee-text { 
            display: inline-block; 
            padding-left: 100%; 
            animation: marquee-scroll 8s linear infinite; 
            will-change: transform; 
        }
        @keyframes marquee-scroll { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased h-screen w-screen flex items-center justify-center p-2 overflow-hidden m-0">

    <!-- Main Widget Banner -->
    <div id="widget-container" class="group relative w-full max-w-2xl bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm flex items-center overflow-hidden transition-colors duration-300">
        
        <!-- Left: Countdown -->
        <div class="flex-shrink-0 w-24 sm:w-28 bg-gray-50 dark:bg-[#202020] border-r border-gray-200 dark:border-gray-800 p-3 flex flex-col items-center justify-center transition-colors duration-300 z-10">
            <span id="countdown-number" class="text-xl sm:text-2xl font-bold leading-none tabular-nums">--</span>
            <span id="countdown-label" class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mt-1">Loading</span>
        </div>

        <!-- Right: Marquee & Add Button -->
        <div class="flex-grow relative h-14 sm:h-16 flex items-center overflow-hidden">
            <div class="marquee-wrapper h-full">
                <div id="event-title" class="marquee-text text-sm sm:text-base font-medium">Loading events...</div>
            </div>
            
            <!-- Always visible + button for easier interaction in Notion -->
            <button id="btn-open-modal" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 sm:p-2 rounded-md bg-white dark:bg-[#191919] text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-200 shadow-sm border border-gray-200 dark:border-gray-700 z-20 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4" style="display: none;">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh] relative">
            
            <!-- Header -->
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 class="text-lg font-semibold">Manage Events</h2>
                <button id="btn-close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-gray-50 dark:bg-[#252525]">
                <input type="hidden" id="edit-id" value="">
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Event Title</label>
                        <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Target Date</label>
                        <input type="date" id="input-date" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 [color-scheme:light] dark:[color-scheme:dark]">
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md text-sm transition-colors cursor-pointer">Add Event</button>
                        <button id="btn-cancel" class="hidden px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors cursor-pointer">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- List Area -->
            <div class="flex-1 overflow-y-auto no-scrollbar p-4">
                <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Existing Events</h3>
                <ul id="event-list" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-[200]">
        Notification
    </div>

    <!-- Core Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let events = JSON.parse(localStorage.getItem('notion_countdown_events')) || [];
            let currentIndex = 0;

            // DOM Elements
            const elNumber = document.getElementById('countdown-number');
            const elLabel = document.getElementById('countdown-label');
            const elTitle = document.getElementById('event-title');
            
            const overlay = document.getElementById('modal-overlay');
            const btnOpen = document.getElementById('btn-open-modal');
            const btnClose = document.getElementById('btn-close-modal');
            
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputId = document.getElementById('edit-id');
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            const listContainer = document.getElementById('event-list');
            const toast = document.getElementById('toast');

            // --- Functions ---

            function calcDaysLeft(dateStr) {
                const today = new Date(); today.setHours(0, 0, 0, 0); 
                const target = new Date(dateStr); target.setHours(0, 0, 0, 0);
                return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            }

            function updateMarquee() {
                if (events.length === 0) {
                    elNumber.textContent = "--"; 
                    elLabel.textContent = "Days";
                    elTitle.textContent = "Click + to add events"; 
                    return;
                }

                if (currentIndex >= events.length) currentIndex = 0;
                
                const ev = events[currentIndex];
                const days = calcDaysLeft(ev.date);
                
                let numStr = "", labelStr = "", colClass = "text-gray-800 dark:text-gray-200"; 
                if (days > 0) { 
                    numStr = days; labelStr = days === 1 ? "Day" : "Days"; 
                } else if (days === 0) { 
                    numStr = "0"; labelStr = "Today"; colClass = "text-green-600 dark:text-green-500"; 
                } else { 
                    numStr = Math.abs(days); labelStr = "Days Ago"; colClass = "text-gray-400 dark:text-gray-500"; 
                }

                elTitle.textContent = ev.title; 
                elNumber.textContent = numStr; 
                elLabel.textContent = labelStr;
                elNumber.className = `text-xl sm:text-2xl font-bold leading-none tabular-nums transition-colors duration-300 ${colClass}`;
                
                currentIndex = (currentIndex + 1) % events.length;
            }

            function refreshAnimation() {
                elTitle.style.animation = 'none'; 
                void elTitle.offsetWidth; // trigger reflow
                elTitle.style.animation = ''; 
                updateMarquee();
            }

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.style.opacity = '1'; 
                setTimeout(() => toast.style.opacity = '0', 2000); 
            }

            function saveData() { 
                localStorage.setItem('notion_countdown_events', JSON.stringify(events)); 
                renderList(); 
                refreshAnimation(); 
            }

            function resetForm() { 
                inputTitle.value = ""; inputDate.value = ""; inputId.value = ""; 
                btnSave.textContent = "Add Event"; btnCancel.classList.add('hidden'); 
            }

            function renderList() {
                listContainer.innerHTML = '';
                if (events.length === 0) { 
                    listContainer.innerHTML = '<li class="text-sm text-gray-500 text-center py-4">No events yet</li>'; 
                    return; 
                }

                events.forEach(ev => {
                    const days = calcDaysLeft(ev.date);
                    let badge = days > 0 ? `<span class="text-xs bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">${days} Days</span>` : 
                                days === 0 ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Today</span>` : 
                                `<span class="text-xs bg-gray-100 dark:bg-gray-800 text-gray-400 px-2 py-1 rounded">Ended</span>`;
                    
                    const li = document.createElement('li');
                    li.className = "flex items-center justify-between p-3 bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg";
                    li.innerHTML = `
                        <div class="flex flex-col overflow-hidden">
                            <span class="font-medium text-sm truncate">${ev.title}</span>
                            <div class="flex items-center gap-2 mt-1"><span class="text-xs text-gray-500">${ev.date}</span>${badge}</div>
                        </div>
                        <div class="flex gap-1 ml-2 flex-shrink-0">
                            <button data-action="edit" data-id="${ev.id}" class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-md cursor-pointer">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-1.5 text-red-600 hover:bg-red-50 rounded-md cursor-pointer">✕</button>
                        </div>
                    `;
                    listContainer.appendChild(li);
                });
            }

            // --- Event Listeners ---
            
            // Loop Marquee
            elTitle.addEventListener('animationiteration', updateMarquee);

            // Modal Controls
            btnOpen.addEventListener('click', () => { 
                overlay.style.display = 'flex'; 
                renderList(); 
                resetForm(); 
            });
            
            btnClose.addEventListener('click', () => { 
                overlay.style.display = 'none'; 
            });
            
            // Close modal when clicking outside the box
            overlay.addEventListener('click', (e) => { 
                if (e.target === overlay) overlay.style.display = 'none'; 
            });

            // Save / Add Event
            btnSave.addEventListener('click', () => {
                const title = inputTitle.value.trim();
                const date = inputDate.value;
                const editId = inputId.value;

                if (!title || !date) return showToast("Please enter a title and date!");
                
                if (editId) { 
                    const idx = events.findIndex(e => e.id === editId); 
                    if (idx !== -1) { events[idx] = { id: editId, title, date }; showToast("Event updated"); } 
                } else { 
                    events.push({ id: Date.now().toString(), title, date }); showToast("Event added"); 
                }
                
                currentIndex = 0; 
                saveData(); 
                resetForm();
            });

            btnCancel.addEventListener('click', resetForm);

            // List Actions (Edit / Delete) using Event Delegation
            listContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        btnSave.textContent = "Save Changes"; 
                        btnCancel.classList.remove('hidden'); 
                    }
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== id); 
                    showToast("Event deleted"); 
                    currentIndex = 0; 
                    saveData(); 
                    resetForm();
                }
            });

            // --- Init ---
            if (events.length === 0) { 
                const nextWeek = new Date(); nextWeek.setDate(nextWeek.getDate() + 7); 
                events.push({ id: 'demo1', title: 'Welcome! Click + to manage events', date: nextWeek.toISOString().split('T')[0] }); 
                saveData(); 
            } else { 
                refreshAnimation(); 
            }
        });
    </script>
</body>
</html>
