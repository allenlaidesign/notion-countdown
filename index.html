<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Hover animation for edit/delete buttons */
        .hover-slide { transition: transform 0.3s ease; }
        .group:hover .hover-slide { transform: translateX(4px); }

        /* Continuous Idle Animation (Breathing Effect) */
        .animate-breathe {
            animation: breathe 4s ease-in-out infinite;
            will-change: transform;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased min-h-screen w-full flex flex-col items-center p-2 sm:p-4 m-0 overflow-y-auto no-scrollbar">

    <!-- Container for all Event Banners -->
    <div id="events-container" class="w-full max-w-2xl space-y-3 flex flex-col">
        <!-- Event rows will be injected here by JS -->
    </div>

    <!-- Hover-to-Add Area -->
    <div class="w-full max-w-2xl mt-2 opacity-0 hover:opacity-100 transition-opacity duration-300 flex justify-center py-2 relative group cursor-pointer" id="btn-add-new">
        <div class="absolute inset-0 border-2 border-dashed border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-lg pointer-events-none transition-colors duration-300"></div>
        <button class="bg-gray-100 dark:bg-[#202020] hover:bg-blue-50 dark:hover:bg-blue-900/30 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 rounded-full p-2.5 shadow-sm transition-colors border border-gray-200 dark:border-gray-700 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Settings & Add Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4" style="display: none;">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh] relative fade-in overflow-hidden">
            
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 id="modal-title" class="text-lg font-semibold">Add New Event</h2>
                <button id="btn-close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Main Input Area (Hidden when Action Required) -->
            <div id="modal-main-view" class="flex flex-col w-full">
                <div class="p-4 bg-gray-50 dark:bg-[#252525] rounded-b-xl border-b border-gray-200 dark:border-gray-800">
                    <input type="hidden" id="edit-id" value="">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Event Title</label>
                            <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Target Date (Midnight)</label>
                            <input type="date" id="input-date" lang="en-US" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow [color-scheme:light] dark:[color-scheme:dark]">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-md text-sm transition-colors shadow-sm cursor-pointer">Save Event</button>
                            <button id="btn-cancel" class="hidden px-4 py-2.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors shadow-sm cursor-pointer">Cancel</button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-4">
                    <h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Existing Events</h3>
                    <ul id="event-list" class="space-y-2"></ul>
                </div>
            </div>

            <!-- Action Required View (Covers settings perfectly) -->
            <div id="modal-action-view" class="hidden flex-col items-center justify-center p-8 bg-gray-50 dark:bg-[#252525] w-full text-center min-h-[300px]">
                <div class="w-14 h-14 bg-yellow-100 dark:bg-yellow-900/30 rounded-full flex items-center justify-center mb-4">
                    <span class="text-2xl">⚠️</span>
                </div>
                <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-2">Action Required to Save</h3>
                <p class="text-[13px] text-gray-600 dark:text-gray-400 mb-6 leading-relaxed">
                    Notion clears local data on refresh. You <strong>MUST</strong> copy this link and replace the old embed in Notion to permanently save your changes.
                </p>
                
                <div class="flex w-full gap-2 mb-8">
                    <input type="text" id="embed-link" readonly class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-blue-200 dark:border-blue-700 rounded-md text-xs text-gray-600 dark:text-gray-400 focus:outline-none shadow-inner">
                    <button id="btn-copy-link" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium whitespace-nowrap shadow-sm cursor-pointer transition-colors">Copy Link</button>
                </div>

                <button id="btn-back-to-main" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 text-sm font-medium transition-colors cursor-pointer flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to Settings
                </button>
            </div>
            
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[200]">
        Notification
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let events = [];
            let tickInterval = null;

            function encodeData(data) { return btoa(encodeURIComponent(JSON.stringify(data))); }
            function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

            const urlParams = new URLSearchParams(window.location.search);
            const urlData = urlParams.get('d');
            
            if (urlData) {
                const decoded = decodeData(urlData);
                if (decoded && Array.isArray(decoded)) events = decoded;
            } else {
                try {
                    const stored = localStorage.getItem('notion_countdown_events_v5');
                    if (stored) events = JSON.parse(stored);
                } catch (e) { console.warn("Storage blocked"); }
            }

            // DOM Variables
            const container = document.getElementById('events-container');
            const btnAddNew = document.getElementById('btn-add-new');
            const overlay = document.getElementById('modal-overlay');
            const btnClose = document.getElementById('btn-close-modal');
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputId = document.getElementById('edit-id');
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            const toast = document.getElementById('toast');
            
            const modalMainView = document.getElementById('modal-main-view');
            const modalActionView = document.getElementById('modal-action-view');
            const btnBackToMain = document.getElementById('btn-back-to-main');

            const embedLinkInput = document.getElementById('embed-link');
            const btnCopyLink = document.getElementById('btn-copy-link');
            const modalTitle = document.getElementById('modal-title');

            const pad = (n) => n.toString().padStart(2, '0');

            function getRemainingTime(targetStr) {
                const now = new Date();
                now.setHours(0, 0, 0, 0); // Force current time to midnight
                const target = new Date(targetStr + 'T00:00:00'); // Force target to midnight
                const diffMs = target.getTime() - now.getTime();

                if (diffMs <= 0) return { d: 0, ended: true };

                // Calculate total days left
                const days = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
                return { d: days, ended: false };
            }

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.classList.remove('opacity-0', 'translate-y-4'); 
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2500); 
            }

            function updateEmbedLink() {
                const baseUrl = window.location.origin + window.location.pathname;
                const link = events.length > 0 ? `${baseUrl}?d=${encodeData(events)}` : baseUrl;
                embedLinkInput.value = link;
            }

            function triggerActionView() {
                updateEmbedLink();
                modalMainView.classList.add('hidden');
                modalActionView.classList.remove('hidden');
                modalActionView.classList.add('fade-in');
            }

            function saveData() { 
                if (!urlData) { 
                    try { localStorage.setItem('notion_countdown_events_v5', JSON.stringify(events)); } catch (e) {}
                }
                renderBanners(); 
            }

            function resetForm() { 
                inputTitle.value = ""; 
                inputDate.value = ""; 
                inputId.value = ""; 
                modalTitle.textContent = "Add New Event";
                btnSave.textContent = "Save Event"; 
                btnCancel.classList.add('hidden'); 
                
                modalMainView.classList.remove('hidden');
                modalActionView.classList.add('hidden');
            }

            function renderBanners() {
                // Auto sort by date (closest events at the top)
                events.sort((a, b) => new Date(a.date) - new Date(b.date));

                container.innerHTML = '';
                
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-[#191919] border border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center text-gray-500 text-sm fade-in">
                            No events yet. Hover below to add one!
                        </div>
                    `;
                    return;
                }

                events.forEach(ev => {
                    const row = document.createElement('div');
                    row.className = "group relative flex items-stretch bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm overflow-hidden h-20 sm:h-24 transition-all duration-300 hover:shadow-md hover:border-gray-300 dark:hover:border-gray-600 fade-in";
                    
                    row.innerHTML = `
                        <!-- Left: Huge Continuous Breathing Days Countdown -->
                        <div class="flex-shrink-0 px-6 sm:px-10 bg-gray-50 dark:bg-[#202020] border-r border-gray-200 dark:border-gray-800 flex flex-col items-center justify-center transition-colors group-hover:bg-gray-100 dark:group-hover:bg-[#252525]">
                            <div class="flex flex-col items-center animate-breathe">
                                <span id="val-d-${ev.id}" class="text-4xl sm:text-5xl font-black tabular-nums tracking-tight leading-none text-gray-800 dark:text-gray-200">00</span>
                                <span class="text-xs font-bold uppercase tracking-widest text-gray-400 mt-1.5">days</span>
                            </div>
                        </div>
                        
                        <!-- Right: Event Title with slight slide on hover -->
                        <div class="flex-grow p-4 sm:p-6 flex items-center overflow-hidden bg-white dark:bg-[#191919] z-10">
                            <span class="font-semibold text-base sm:text-lg text-gray-800 dark:text-gray-100 truncate pr-16 tracking-tight hover-slide">${ev.title}</span>
                        </div>

                        <!-- Hover Actions (Edit & Delete) -->
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20">
                            <button data-action="edit" data-id="${ev.id}" class="p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer transition-colors focus:outline-none hover:scale-105 active:scale-95">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer transition-colors focus:outline-none hover:scale-105 active:scale-95">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });

                tickTime(); // Run once immediately
            }

            function tickTime() {
                events.forEach(ev => {
                    const rem = getRemainingTime(ev.date);
                    const valD = document.getElementById(`val-d-${ev.id}`);
                    
                    if (!valD) return;
                    
                    if (rem.ended) {
                        valD.textContent = "00";
                        valD.className = "text-4xl sm:text-5xl font-black tabular-nums tracking-tight leading-none text-gray-300 dark:text-gray-600";
                    } else {
                        // Pad the days to always have at least 2 digits
                        valD.textContent = pad(rem.d);
                        valD.className = "text-4xl sm:text-5xl font-black tabular-nums tracking-tight leading-none text-gray-800 dark:text-gray-200";
                    }
                });
            }

            // --- Event Listeners ---

            btnAddNew.addEventListener('click', () => { 
                overlay.style.display = 'flex'; 
                resetForm(); 
            });

            btnClose.addEventListener('click', () => { overlay.style.display = 'none'; });
            btnBackToMain.addEventListener('click', () => { resetForm(); });
            
            btnCopyLink.addEventListener('click', () => {
                embedLinkInput.select();
                document.execCommand('copy');
                btnCopyLink.textContent = "Copied!";
                btnCopyLink.classList.replace('bg-blue-600', 'bg-green-600');
                btnCopyLink.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                showToast("✅ Copied! Now replace the embed link in Notion.");
                
                setTimeout(() => {
                    btnCopyLink.textContent = "Copy Link";
                    btnCopyLink.classList.replace('bg-green-600', 'bg-blue-600');
                    btnCopyLink.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                }, 2000);
            });

            btnSave.addEventListener('click', () => {
                const title = inputTitle.value.trim();
                const date = inputDate.value;
                const editId = inputId.value;

                if (!title || !date) return showToast("⚠️ Please enter a title and date!");
                
                if (editId) { 
                    const idx = events.findIndex(e => e.id === editId); 
                    if (idx !== -1) events[idx] = { id: editId, title, date }; 
                } else { 
                    events.push({ id: Date.now().toString(), title, date }); 
                }
                
                saveData(); 
                triggerActionView();
            });

            btnCancel.addEventListener('click', resetForm);

            container.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        modalTitle.textContent = "Edit Event";
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        btnSave.textContent = "Save Changes"; 
                        btnCancel.classList.remove('hidden'); 
                        overlay.style.display = 'flex';
                    }
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== id); 
                    saveData(); 
                    
                    // Force them to copy link after deleting too!
                    overlay.style.display = 'flex';
                    resetForm();
                    modalTitle.textContent = "Event Deleted";
                    triggerActionView();
                }
            });

            // --- Initialization ---
            if (events.length === 0 && !urlData) { 
                const nextWeek = new Date(); 
                nextWeek.setDate(nextWeek.getDate() + 7);
                events.push({ id: 'demo1', title: 'Example Event (Please delete me)', date: nextWeek.toISOString().split('T')[0] }); 
                saveData(); 
            } else {
                renderBanners();
            }

            // Check if days changed at midnight
            tickInterval = setInterval(tickTime, 60000); 
        });
    </script>
</body>
</html>
