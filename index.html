<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Entrance animation */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Flowing Divider Animation (Between Left and Right) */
        .flowing-container {
            width: 2px;
            position: relative;
            overflow: hidden;
            background-color: #f3f4f6; /* gray-100 */
        }
        .dark .flowing-container {
            background-color: #262626; /* neutral-800 */
        }
        .flowing-bar {
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to bottom, transparent, #3b82f6, transparent);
            animation: slide-down 2s linear infinite;
        }
        .dark .flowing-bar {
            background: linear-gradient(to bottom, transparent, #60a5fa, transparent);
        }
        @keyframes slide-down {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased min-h-screen w-full flex flex-col items-center p-2 sm:p-4 m-0 overflow-y-auto no-scrollbar">

    <!-- Container for Events -->
    <div id="events-container" class="w-full max-w-2xl space-y-3 flex flex-col">
        <!-- Banners go here -->
    </div>

    <!-- Add New Area (Hover to show) -->
    <div class="w-full max-w-2xl mt-2 opacity-0 hover:opacity-100 transition-opacity duration-300 flex justify-center py-3 relative group cursor-pointer" id="btn-add-new">
        <div class="absolute inset-0 border-2 border-dashed border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-lg pointer-events-none transition-colors duration-300"></div>
        <button class="bg-gray-100 dark:bg-[#202020] hover:bg-blue-50 dark:hover:bg-blue-900/30 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 rounded-full p-2.5 shadow-sm transition-colors border border-gray-200 dark:border-gray-700 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Fullscreen Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col overflow-hidden relative fade-in transition-all">
            
            <!-- Header -->
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 id="modal-title" class="text-lg font-semibold">Add Event</h2>
                <button id="btn-close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1 cursor-pointer transition-colors rounded">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- View 1: Edit/Add Form -->
            <div id="view-form" class="p-5 bg-gray-50 dark:bg-[#252525]">
                <input type="hidden" id="edit-id" value="">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Event Title</label>
                        <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Date</label>
                        <input type="date" id="input-date" lang="en-US" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow [color-scheme:light] dark:[color-scheme:dark]">
                    </div>
                    <div class="flex gap-2 pt-3">
                        <button id="btn-save" class="flex-1 bg-gray-900 dark:bg-gray-200 hover:bg-black dark:hover:bg-white text-white dark:text-black font-semibold py-2.5 px-4 rounded-md text-sm transition-colors shadow-sm cursor-pointer">Save Event</button>
                        <button id="btn-cancel" class="hidden px-4 py-2.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors shadow-sm cursor-pointer">Cancel</button>
                    </div>
                </div>
            </div>

            <!-- View 2: Action Required (Copy Link) -->
            <div id="view-action" class="hidden p-6 bg-blue-50 dark:bg-blue-900/20 text-center flex-col items-center justify-center">
                <div class="w-12 h-12 bg-blue-100 dark:bg-blue-800 text-blue-600 dark:text-blue-300 rounded-full flex items-center justify-center mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-blue-900 dark:text-blue-100 mb-2">⚠️ Action Required</h3>
                <p class="text-xs text-blue-700 dark:text-blue-300 mb-5 leading-relaxed px-2">
                    Your changes are ready! To prevent Notion from resetting your data, you must copy this new link and replace your existing embed.
                </p>
                
                <input type="text" id="embed-link" readonly class="w-full px-3 py-2 text-center bg-white dark:bg-[#191919] border border-blue-200 dark:border-blue-700 rounded-md text-xs text-gray-600 dark:text-gray-400 focus:outline-none shadow-inner mb-4">
                
                <div class="flex w-full gap-2">
                    <button id="btn-copy-link" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-md text-sm transition-colors shadow-md cursor-pointer flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy Link
                    </button>
                    <button id="btn-done" class="px-4 py-2.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors shadow-sm cursor-pointer">Done</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[200]">
        Copied!
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let events = [];

            // --- Encoding/Decoding for URL State ---
            function encodeData(data) { return btoa(encodeURIComponent(JSON.stringify(data))); }
            function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

            // Load Initial Data from URL
            const urlParams = new URLSearchParams(window.location.search);
            const urlData = urlParams.get('d');
            
            if (urlData) {
                const decoded = decodeData(urlData);
                if (decoded && Array.isArray(decoded)) events = decoded;
            } else {
                try {
                    const stored = localStorage.getItem('notion_countdown_simple');
                    if (stored) events = JSON.parse(stored);
                } catch (e) {}
            }

            // DOM Elements
            const container = document.getElementById('events-container');
            const btnAddNew = document.getElementById('btn-add-new');
            const overlay = document.getElementById('modal-overlay');
            const btnClose = document.getElementById('btn-close-modal');
            const viewForm = document.getElementById('view-form');
            const viewAction = document.getElementById('view-action');
            
            const modalTitle = document.getElementById('modal-title');
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputId = document.getElementById('edit-id');
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            
            const embedLinkInput = document.getElementById('embed-link');
            const btnCopyLink = document.getElementById('btn-copy-link');
            const btnDone = document.getElementById('btn-done');
            const toast = document.getElementById('toast');

            // --- Logic ---
            function calcDaysLeft(dateStr) {
                const today = new Date(); today.setHours(0, 0, 0, 0); 
                const target = new Date(dateStr); target.setHours(0, 0, 0, 0);
                return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            }

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.classList.remove('opacity-0', 'translate-y-4'); 
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000); 
            }

            function getEmbedLink() {
                const baseUrl = window.location.origin + window.location.pathname;
                return events.length > 0 ? `${baseUrl}?d=${encodeData(events)}` : baseUrl;
            }

            function showActionRequired() {
                modalTitle.textContent = "Almost Done!";
                viewForm.classList.add('hidden');
                viewAction.classList.remove('hidden');
                viewAction.classList.add('flex');
                embedLinkInput.value = getEmbedLink();
            }

            function resetModal() {
                inputTitle.value = ""; 
                inputDate.value = ""; 
                inputId.value = ""; 
                modalTitle.textContent = "Add Event";
                btnSave.textContent = "Save Event"; 
                btnCancel.classList.add('hidden');
                
                viewAction.classList.add('hidden');
                viewAction.classList.remove('flex');
                viewForm.classList.remove('hidden');
            }

            function sortEvents() {
                // Sort by date ascending (closest date first)
                events.sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            function renderBanners() {
                container.innerHTML = '';
                
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-[#191919] border border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center text-gray-500 text-sm fade-in">
                            No events yet. Hover below to add one!
                        </div>
                    `;
                    return;
                }

                events.forEach(ev => {
                    const days = calcDaysLeft(ev.date);
                    let numDisplay = "", labelDisplay = "", colorClass = "";

                    if (days > 0) {
                        numDisplay = days;
                        labelDisplay = days === 1 ? "Day" : "Days";
                        colorClass = "text-gray-900 dark:text-white";
                    } else if (days === 0) {
                        numDisplay = "0";
                        labelDisplay = "Today";
                        colorClass = "text-green-600 dark:text-green-500";
                    } else {
                        numDisplay = Math.abs(days);
                        labelDisplay = "Days Ago";
                        colorClass = "text-gray-400 dark:text-gray-500";
                    }

                    const row = document.createElement('div');
                    // Removed fixed height, letting it pad naturally
                    row.className = "group relative flex items-stretch bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm overflow-hidden transition-all duration-300 hover:shadow-md fade-in min-h-[4rem]";
                    
                    row.innerHTML = `
                        <!-- Left: Countdown Data (Smaller & Refined) -->
                        <div class="flex-shrink-0 w-28 sm:w-32 bg-gray-50/40 dark:bg-[#202020]/40 p-3 flex items-center justify-center transition-colors">
                            <div class="flex items-baseline gap-1.5">
                                <span class="text-2xl font-bold tabular-nums tracking-tight ${colorClass}">${numDisplay}</span>
                                <span class="text-[11px] sm:text-xs font-semibold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-0.5">${labelDisplay}</span>
                            </div>
                        </div>

                        <!-- NEW: Flowing Animated Divider -->
                        <div class="flowing-container flex-shrink-0">
                            <div class="flowing-bar"></div>
                        </div>
                        
                        <!-- Right: Event Title -->
                        <div class="flex-grow p-4 flex flex-col justify-center overflow-hidden relative">
                            <span class="font-medium text-sm sm:text-base text-gray-800 dark:text-gray-200 truncate pr-16">${ev.title}</span>
                        </div>

                        <!-- Hover Actions (Edit & Delete) -->
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                            <button data-action="edit" data-id="${ev.id}" class="p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer transition-colors focus:outline-none">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer transition-colors focus:outline-none">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }

            // --- Event Listeners ---

            // Open Add Modal
            btnAddNew.addEventListener('click', () => { 
                resetModal();
                overlay.style.display = 'flex'; 
            });

            // Close Modal
            const closeModal = () => { overlay.style.display = 'none'; };
            btnClose.addEventListener('click', closeModal);
            btnCancel.addEventListener('click', closeModal);
            btnDone.addEventListener('click', closeModal);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

            // Copy Link Button in Action View
            btnCopyLink.addEventListener('click', () => {
                embedLinkInput.select();
                document.execCommand('copy');
                showToast("✅ Link Copied! Replace it in Notion.");
                btnCopyLink.innerHTML = "Copied!";
                btnCopyLink.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btnCopyLink.classList.add('bg-green-600', 'hover:bg-green-700');
                
                setTimeout(() => {
                    btnCopyLink.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Link`;
                    btnCopyLink.classList.add('bg-blue-600', 'hover:bg-blue-700');
                    btnCopyLink.classList.remove('bg-green-600', 'hover:bg-green-700');
                }, 2000);
            });

            // Save / Edit Event
            btnSave.addEventListener('click', () => {
                const title = inputTitle.value.trim();
                const date = inputDate.value;
                const editId = inputId.value;

                if (!title || !date) {
                    showToast("⚠️ Please enter a title and date!");
                    return;
                }
                
                if (editId) { 
                    const idx = events.findIndex(e => e.id === editId); 
                    if (idx !== -1) events[idx] = { id: editId, title, date }; 
                } else { 
                    events.push({ id: Date.now().toString(), title, date }); 
                }
                
                sortEvents(); // Sort immediately after saving
                
                if (!urlData) {
                    try { localStorage.setItem('notion_countdown_simple', JSON.stringify(events)); } catch(e){}
                }
                
                renderBanners();
                showActionRequired(); // Show the copy link screen
            });

            // Edit / Delete Actions via Event Delegation
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        resetModal();
                        modalTitle.textContent = "Edit Event";
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        btnSave.textContent = "Save Changes"; 
                        btnCancel.classList.remove('hidden'); 
                        overlay.style.display = 'flex';
                    }
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== id); 
                    if (!urlData) {
                        try { localStorage.setItem('notion_countdown_simple', JSON.stringify(events)); } catch(e){}
                    }
                    renderBanners(); 
                    
                    // Show Action Required screen because link changed
                    overlay.style.display = 'flex';
                    showActionRequired();
                }
            });

            // --- Initialization ---
            if (events.length === 0 && !urlData) { 
                const nextWeek = new Date(); 
                nextWeek.setDate(nextWeek.getDate() + 14);
                
                events.push({ 
                    id: 'demo1', 
                    title: 'Trip to Tokyo', 
                    date: nextWeek.toISOString().split('T')[0] 
                }); 
                
                if (!urlData) {
                    try { localStorage.setItem('notion_countdown_simple', JSON.stringify(events)); } catch(e){}
                }
            }
            
            sortEvents();
            renderBanners();
        });
    </script>
</body>
</html>
