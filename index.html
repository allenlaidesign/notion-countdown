<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'],
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .marquee-wrapper { overflow: hidden; white-space: nowrap; width: 100%; display: flex; align-items: center; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee-scroll 8s linear infinite; will-change: transform; }
        @keyframes marquee-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased h-screen w-screen flex items-center justify-center p-2 overflow-hidden">
    <div id="widget-container" class="group relative w-full max-w-2xl bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm flex items-center overflow-hidden transition-colors duration-300">
        <div class="flex-shrink-0 w-24 sm:w-28 bg-gray-50 dark:bg-[#202020] border-r border-gray-200 dark:border-gray-800 p-3 flex flex-col items-center justify-center transition-colors duration-300 z-10 relative">
            <span id="countdown-number" class="text-xl sm:text-2xl font-bold leading-none tabular-nums">--</span>
            <span id="countdown-label" class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mt-1">Loading</span>
        </div>
        <div class="flex-grow relative h-14 sm:h-16 flex items-center overflow-hidden">
            <div id="event-title-container" class="marquee-wrapper h-full">
                <div id="event-title" class="marquee-text text-sm sm:text-base font-medium">Hover and click + to add events</div>
            </div>
            <button id="open-settings-btn" title="Add / Manage Events" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-md bg-white/80 dark:bg-[#191919]/80 backdrop-blur-sm text-gray-400 hover:text-gray-800 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 opacity-0 group-hover:opacity-100 transition-all duration-200 focus:opacity-100 outline-none shadow-sm border border-transparent hover:border-gray-200 dark:hover:border-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 class="text-lg font-semibold">Manage Events</h2>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="p-4 bg-gray-50 dark:bg-[#252525]">
                <input type="hidden" id="edit-id" value="">
                <div class="space-y-3">
                    <div><label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Event Title</label><input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-colors"></div>
                    <div><label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Target Date</label><input type="date" id="input-date" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-colors [color-scheme:light] dark:[color-scheme:dark]"></div>
                    <div class="flex gap-2 pt-1">
