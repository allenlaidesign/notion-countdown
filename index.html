<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth fade in for rows */
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased min-h-screen w-full flex flex-col items-center p-2 sm:p-4 m-0 overflow-y-auto no-scrollbar">

    <!-- Container for all Event Banners -->
    <div id="events-container" class="w-full max-w-2xl space-y-3 flex flex-col">
        <!-- Event rows will be injected here by JS -->
    </div>

    <!-- Hover-to-Add Area at the bottom -->
    <div class="w-full max-w-2xl mt-2 opacity-0 hover:opacity-100 transition-opacity duration-300 flex justify-center py-2 relative group cursor-pointer" id="btn-add-new">
        <!-- Dashed border visualization on hover -->
        <div class="absolute inset-0 border-2 border-dashed border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-lg pointer-events-none transition-colors duration-300"></div>
        
        <button class="bg-gray-100 dark:bg-[#202020] hover:bg-blue-50 dark:hover:bg-blue-900/30 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 rounded-full p-2.5 shadow-sm transition-colors border border-gray-200 dark:border-gray-700 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Settings & Add Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4" style="display: none;">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh] relative fade-in">
            
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 id="modal-title" class="text-lg font-semibold">Add New Event</h2>
                <button id="btn-close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <div class="p-4 bg-gray-50 dark:bg-[#252525] rounded-b-xl">
                <input type="hidden" id="edit-id" value="">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Event Title</label>
                        <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Target Date & Time</label>
                        <!-- Changed to datetime-local and added lang="en-US" -->
                        <input type="datetime-local" id="input-date" lang="en-US" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow [color-scheme:light] dark:[color-scheme:dark]">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-md text-sm transition-colors shadow-sm cursor-pointer">Save Event</button>
                        <button id="btn-cancel" class="hidden px-4 py-2.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors shadow-sm cursor-pointer">Cancel</button>
                    </div>
                </div>

                <!-- Dedicated Notion Embed Link Area -->
                <div class="mt-6 p-3.5 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/60 rounded-lg">
                    <label class="block text-xs font-bold text-blue-800 dark:text-blue-300 mb-1.5">Notion Embed Link (Crucial)</label>
                    <div class="flex gap-2">
                        <input type="text" id="embed-link" readonly class="w-full px-2.5 py-1.5 bg-white dark:bg-[#191919] border border-blue-200 dark:border-blue-700 rounded text-xs text-gray-600 dark:text-gray-400 focus:outline-none shadow-inner">
                        <button id="btn-copy-link" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap shadow-sm cursor-pointer transition-colors">Copy</button>
                    </div>
                    <p class="text-[10px] text-blue-600 dark:text-blue-400 mt-2 leading-relaxed">
                        Whenever you add, edit, or delete an event, you <strong>must copy this new link</strong> and replace the embed block in Notion. This guarantees your data never resets!
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[200]">
        Notification
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let events = [];
            let tickInterval = null;

            // --- Encoding/Decoding for URL State ---
            function encodeData(data) { return btoa(encodeURIComponent(JSON.stringify(data))); }
            function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

            // Load Initial Data (Prioritize URL)
            const urlParams = new URLSearchParams(window.location.search);
            const urlData = urlParams.get('d');
            
            if (urlData) {
                const decoded = decodeData(urlData);
                if (decoded && Array.isArray(decoded)) events = decoded;
            } else {
                try {
                    const stored = localStorage.getItem('notion_countdown_events_v2');
                    if (stored) events = JSON.parse(stored);
                } catch (e) { console.warn("Storage blocked"); }
            }

            // DOM Elements
            const container = document.getElementById('events-container');
            const btnAddNew = document.getElementById('btn-add-new');
            const overlay = document.getElementById('modal-overlay');
            const btnClose = document.getElementById('btn-close-modal');
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputId = document.getElementById('edit-id');
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            const toast = document.getElementById('toast');
            const embedLinkInput = document.getElementById('embed-link');
            const btnCopyLink = document.getElementById('btn-copy-link');
            const modalTitle = document.getElementById('modal-title');

            // Formats number to 2 digits (e.g. 5 -> "05")
            const pad = (n) => n.toString().padStart(2, '0');

            function getRemainingTime(targetStr) {
                const now = new Date().getTime();
                const target = new Date(targetStr).getTime();
                const diff = target - now;

                if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, ended: true };

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                return { d, h, m, s, ended: false };
            }

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.classList.remove('opacity-0', 'translate-y-4'); 
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000); 
            }

            function updateEmbedLink() {
                const baseUrl = window.location.origin + window.location.pathname;
                const link = events.length > 0 ? `${baseUrl}?d=${encodeData(events)}` : baseUrl;
                embedLinkInput.value = link;
            }

            function saveData() { 
                if (!urlData) {
                    try { localStorage.setItem('notion_countdown_events_v2', JSON.stringify(events)); } catch (e) {}
                }
                updateEmbedLink();
                renderBanners(); 
            }

            function resetForm() { 
                inputTitle.value = ""; 
                inputDate.value = ""; 
                inputId.value = ""; 
                modalTitle.textContent = "Add New Event";
                btnSave.textContent = "Save Event"; 
                btnCancel.classList.add('hidden'); 
            }

            // --- UI Rendering ---

            function renderBanners() {
                container.innerHTML = '';
                
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-[#191919] border border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center text-gray-500 text-sm fade-in">
                            No events yet. Hover below to add one!
                        </div>
                    `;
                    return;
                }

                events.forEach(ev => {
                    const row = document.createElement('div');
                    row.className = "group relative flex items-stretch bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm overflow-hidden h-16 sm:h-20 transition-all duration-300 hover:shadow-md fade-in";
                    
                    row.innerHTML = `
                        <!-- Left: Countdown Data -->
                        <div class="flex-shrink-0 w-28 sm:w-32 bg-gray-50 dark:bg-[#202020] border-r border-gray-200 dark:border-gray-800 p-2 flex flex-col items-center justify-center transition-colors">
                            <span id="days-${ev.id}" class="text-xl sm:text-2xl font-bold leading-none tabular-nums text-gray-800 dark:text-gray-200">--</span>
                            <span id="time-${ev.id}" class="text-xs sm:text-[13px] font-semibold tabular-nums tracking-widest text-gray-500 mt-1 opacity-90">--:--:--</span>
                        </div>
                        
                        <!-- Right: Event Title -->
                        <div class="flex-grow p-3 sm:p-4 flex items-center overflow-hidden">
                            <span class="font-medium text-sm sm:text-base truncate pr-16">${ev.title}</span>
                        </div>

                        <!-- Hover Actions (Edit & Delete) -->
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                            <button data-action="edit" data-id="${ev.id}" class="p-1.5 sm:p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 cursor-pointer transition-colors focus:outline-none">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-1.5 sm:p-2 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 cursor-pointer transition-colors focus:outline-none">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });

                // Immediately tick once to prevent "--:--:--" flashing
                tickTime();
            }

            // --- The Ticking Core ---
            function tickTime() {
                events.forEach(ev => {
                    const daysEl = document.getElementById(`days-${ev.id}`);
                    const timeEl = document.getElementById(`time-${ev.id}`);
                    
                    if (!daysEl || !timeEl) return;
                    
                    const rem = getRemainingTime(ev.date);
                    
                    if (rem.ended) {
                        daysEl.innerHTML = `0 <span class="text-[10px] sm:text-xs font-normal">Days</span>`;
                        daysEl.className = "text-xl sm:text-2xl font-bold leading-none tabular-nums text-gray-400 dark:text-gray-500";
                        timeEl.textContent = `00:00:00`;
                    } else {
                        daysEl.innerHTML = `${rem.d} <span class="text-[10px] sm:text-xs font-normal">Days</span>`;
                        daysEl.className = "text-xl sm:text-2xl font-bold leading-none tabular-nums text-gray-800 dark:text-gray-200";
                        timeEl.textContent = `${pad(rem.h)}:${pad(rem.m)}:${pad(rem.s)}`;
                    }
                });
            }

            // --- Event Listeners ---

            // Hover Add Area
            btnAddNew.addEventListener('click', () => { 
                overlay.style.display = 'flex'; 
                resetForm(); 
                updateEmbedLink();
            });

            // Close Modal
            btnClose.addEventListener('click', () => { overlay.style.display = 'none'; });
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
            btnCancel.addEventListener('click', () => { overlay.style.display = 'none'; });

            // Copy Link Button
            btnCopyLink.addEventListener('click', () => {
                embedLinkInput.select();
                document.execCommand('copy');
                showToast("✅ Copied! Now replace the embed link in Notion.");
            });

            // Save / Edit Event
            btnSave.addEventListener('click', () => {
                const title = inputTitle.value.trim();
                const date = inputDate.value;
                const editId = inputId.value;

                if (!title || !date) return showToast("⚠️ Please enter a title and date/time!");
                
                if (editId) { 
                    const idx = events.findIndex(e => e.id === editId); 
                    if (idx !== -1) { 
                        events[idx] = { id: editId, title, date }; 
                        showToast("Event updated! Please copy the new link."); 
                    } 
                } else { 
                    events.push({ id: Date.now().toString(), title, date }); 
                    showToast("Event added! Please copy the new link."); 
                }
                
                saveData(); 
                
                // Highlight link for user to easily copy
                setTimeout(() => {
                    embedLinkInput.select();
                }, 100);
            });

            // Edit / Delete Actions via Event Delegation
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        modalTitle.textContent = "Edit Event";
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        btnSave.textContent = "Save Changes"; 
                        btnCancel.classList.remove('hidden'); 
                        overlay.style.display = 'flex';
                        updateEmbedLink();
                    }
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== id); 
                    saveData(); 
                    showToast("Event deleted! Please copy the updated link.");
                    // Briefly show modal to grab the new URL
                    overlay.style.display = 'flex';
                    resetForm();
                    modalTitle.textContent = "Event Deleted";
                    btnSave.classList.add('hidden');
                    btnCancel.classList.remove('hidden');
                    btnCancel.textContent = "Close";
                    
                    setTimeout(() => {
                         btnSave.classList.remove('hidden');
                         btnCancel.textContent = "Cancel";
                         btnCancel.classList.add('hidden');
                    }, 500);
                }
            });

            // --- Initialization ---
            if (events.length === 0 && !urlData) { 
                // Default sample date (7 days later, noon)
                const nextWeek = new Date(); 
                nextWeek.setDate(nextWeek.getDate() + 7);
                nextWeek.setHours(12, 0, 0, 0);
                
                // Format to YYYY-MM-DDTHH:mm required by datetime-local
                const year = nextWeek.getFullYear();
                const month = pad(nextWeek.getMonth() + 1);
                const day = pad(nextWeek.getDate());
                const hours = pad(nextWeek.getHours());
                const minutes = pad(nextWeek.getMinutes());
                const dateStr = `${year}-${month}-${day}T${hours}:${minutes}`;

                events.push({ id: 'demo1', title: 'Welcome! Hover below to add more.', date: dateStr }); 
                saveData(); 
            } else {
                renderBanners();
            }

            // Start the 1-second interval timer
            tickInterval = setInterval(tickTime, 1000);
        });
    </script>
</body>
</html>
