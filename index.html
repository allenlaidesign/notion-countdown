<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Attention shake for the copy link box */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased min-h-screen w-full flex flex-col items-center p-2 sm:p-4 m-0 overflow-y-auto no-scrollbar">

    <div id="events-container" class="w-full max-w-2xl space-y-3 flex flex-col">
        <!-- Event rows will be injected here -->
    </div>

    <!-- Hover-to-Add Button -->
    <div class="w-full max-w-2xl mt-3 opacity-0 hover:opacity-100 transition-opacity duration-300 flex justify-center py-2 relative group cursor-pointer" id="btn-add-new">
        <div class="absolute inset-0 border-2 border-dashed border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-lg pointer-events-none transition-colors duration-300"></div>
        <button class="bg-gray-50 dark:bg-[#202020] hover:bg-gray-100 dark:hover:bg-[#252525] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-full p-2 shadow-sm transition-colors border border-gray-200 dark:border-gray-700 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4" style="display: none;">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh] relative overflow-hidden fade-in">
            
            <!-- Main View (Form) -->
            <div id="modal-main-view" class="flex flex-col w-full">
                <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-800">
                    <h2 id="modal-title" class="text-base font-semibold text-gray-800 dark:text-gray-100">Add New Event</h2>
                    <button id="btn-close-modal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-1 cursor-pointer transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <div class="p-4 bg-gray-50/50 dark:bg-[#222222] rounded-b-xl border-b border-gray-100 dark:border-gray-800">
                    <input type="hidden" id="edit-id" value="">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Event Title</label>
                            <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-gray-400 dark:focus:ring-gray-600 transition-shadow">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Target Date</label>
                            <input type="date" id="input-date" lang="en-US" class="w-full px-3 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-gray-400 dark:focus:ring-gray-600 transition-shadow [color-scheme:light] dark:[color-scheme:dark]">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button id="btn-save" class="flex-1 bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-gray-800 dark:hover:bg-gray-100 font-medium py-2 px-4 rounded-md text-sm transition-colors cursor-pointer shadow-sm">Save</button>
                            <button id="btn-cancel" class="hidden px-4 py-2 bg-gray-200 dark:bg-[#333] hover:bg-gray-300 dark:hover:bg-[#444] text-gray-700 dark:text-gray-200 rounded-md text-sm font-medium transition-colors cursor-pointer">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action View (Pop-up that covers the settings) -->
            <div id="modal-action-view" class="hidden flex-col items-center justify-center p-8 bg-white dark:bg-[#1e1e1e] w-full text-center rounded-xl">
                <div class="w-14 h-14 bg-yellow-100 dark:bg-yellow-900/30 rounded-full flex items-center justify-center mb-4">
                    <span class="text-2xl">⚠️</span>
                </div>
                <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-2">Action Required to Save</h3>
                <p class="text-[13px] text-gray-600 dark:text-gray-400 mb-6 leading-relaxed">Notion clears data on refresh! You MUST copy this link and replace the old embed in Notion.</p>
                
                <div class="flex w-full gap-2 mb-6">
                    <input type="text" id="embed-link" readonly class="w-full px-3 py-2 bg-gray-50 dark:bg-[#141414] border border-gray-200 dark:border-gray-700 rounded-md text-xs text-gray-600 dark:text-gray-400 focus:outline-none">
                    <button id="btn-copy-link" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-medium whitespace-nowrap transition-colors shadow-sm cursor-pointer">Copy</button>
                </div>

                <button id="btn-back-to-main" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-200 text-sm font-medium transition-colors cursor-pointer flex items-center gap-1">
                    <span>←</span> Back
                </button>
            </div>
            
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 dark:bg-gray-100 text-white dark:text-gray-900 px-5 py-2.5 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[200]">
        Notification
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let events = [];
            let tickInterval = null;

            function encodeData(data) { return btoa(encodeURIComponent(JSON.stringify(data))); }
            function decodeData(str) { try { return JSON.parse(decodeURIComponent(atob(str))); } catch (e) { return null; } }

            // 1. Check URL for data (Highest Priority - Solves Notion refresh issue)
            const urlParams = new URLSearchParams(window.location.search);
            const urlData = urlParams.get('d');
            
            if (urlData) {
                const decoded = decodeData(urlData);
                if (decoded && Array.isArray(decoded)) events = decoded;
            } else {
                // 2. Fallback to LocalStorage (Works in normal browsers)
                try {
                    const stored = localStorage.getItem('notion_countdown_events_v4');
                    if (stored) events = JSON.parse(stored);
                } catch (e) { console.warn("Storage blocked by Notion iframe"); }
            }

            const container = document.getElementById('events-container');
            const btnAddNew = document.getElementById('btn-add-new');
            const overlay = document.getElementById('modal-overlay');
            const btnClose = document.getElementById('btn-close-modal');
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputId = document.getElementById('edit-id');
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            const toast = document.getElementById('toast');
            
            const modalMainView = document.getElementById('modal-main-view');
            const modalActionView = document.getElementById('modal-action-view');
            const btnBackToMain = document.getElementById('btn-back-to-main');

            const embedLinkInput = document.getElementById('embed-link');
            const btnCopyLink = document.getElementById('btn-copy-link');
            const modalTitle = document.getElementById('modal-title');

            const pad = (n) => n.toString().padStart(2, '0');

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.classList.remove('opacity-0', 'translate-y-4'); 
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2500); 
            }

            function updateEmbedLink() {
                const baseUrl = window.location.origin + window.location.pathname;
                const link = events.length > 0 ? `${baseUrl}?d=${encodeData(events)}` : baseUrl;
                embedLinkInput.value = link;
            }

            function triggerSaveRequirement() {
                updateEmbedLink();
                modalMainView.classList.add('hidden');
                modalActionView.classList.remove('hidden');
                modalActionView.classList.add('fade-in');
            }

            function saveDataLocally() {
                if (!urlData) { // Save to local storage if running normally
                    try { localStorage.setItem('notion_countdown_events_v4', JSON.stringify(events)); } catch (e) {}
                }
            }

            function resetForm() { 
                inputTitle.value = ""; inputDate.value = ""; inputId.value = ""; 
                modalTitle.textContent = "Add New Event";
                btnSave.textContent = "Save"; btnCancel.classList.add('hidden'); 
                modalMainView.classList.remove('hidden');
                modalActionView.classList.add('hidden');
            }

            function renderBanners() {
                container.innerHTML = '';
                
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-[#191919] border border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center text-gray-500 text-sm fade-in">
                            No events found. Hover below to add one!
                        </div>
                    `;
                    return;
                }

                events.forEach(ev => {
                    const row = document.createElement('div');
                    row.className = "group relative flex items-stretch bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm overflow-hidden h-[4.25rem] transition-all duration-300 hover:shadow-md fade-in";
                    
                    row.innerHTML = `
                        <!-- Left Side: Adjusted width for perfect balance -->
                        <div class="flex-shrink-0 w-28 sm:w-32 bg-gray-50 dark:bg-[#202020] border-r border-gray-200 dark:border-gray-800 px-2 sm:px-3 flex items-center justify-center">
                            <div id="countdown-val-${ev.id}" class="w-full">
                                <!-- JS will inject the exact time here -->
                            </div>
                        </div>
                        
                        <!-- Right: Event Title -->
                        <div class="flex-grow p-3 sm:p-4 flex items-center overflow-hidden">
                            <span class="font-medium text-sm sm:text-[15px] text-gray-700 dark:text-gray-200 truncate pr-16">${ev.title}</span>
                        </div>

                        <!-- Hover Actions -->
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                            <button data-action="edit" data-id="${ev.id}" class="p-1.5 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-gray-500 hover:text-gray-800 dark:hover:text-white transition-colors">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-1.5 bg-white dark:bg-[#252525] shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-red-400 hover:text-red-600 transition-colors">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });

                updateTicks(); // Run once immediately
            }

            function updateTicks() {
                const now = new Date().getTime();
                
                events.forEach(ev => {
                    const el = document.getElementById(`countdown-val-${ev.id}`);
                    if (!el) return;

                    // Calculate target at 00:00:00 of the selected date
                    const targetDate = new Date(ev.date + 'T00:00:00').getTime();
                    const diff = targetDate - now;

                    if (diff <= 0) {
                        el.innerHTML = `
                            <div class="flex flex-col items-center justify-center w-full opacity-60 text-green-600 dark:text-green-500">
                                <div class="flex items-baseline gap-1">
                                    <span class="text-xl sm:text-2xl font-bold tabular-nums">0</span>
                                    <span class="text-[10px] sm:text-xs font-medium">Today</span>
                                </div>
                                <div class="text-[12px] sm:text-[13px] font-bold tabular-nums tracking-widest mt-0.5">
                                    00:00
                                </div>
                            </div>
                        `;
                        return;
                    }

                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                    const dLabel = d <= 1 ? 'Day' : 'Days';

                    // Stacked elegant layout to fill vertical space perfectly
                    el.innerHTML = `
                        <div class="flex flex-col items-center justify-center w-full">
                            <div class="flex items-baseline gap-1 text-gray-800 dark:text-gray-200">
                                <span class="text-xl sm:text-2xl font-bold tabular-nums tracking-tight">${d}</span>
                                <span class="text-[11px] sm:text-xs font-medium text-gray-500">${dLabel}</span>
                            </div>
                            <div class="text-[12px] sm:text-[13px] font-bold tabular-nums tracking-widest text-gray-400 dark:text-gray-500 mt-0.5">
                                ${pad(h)}:${pad(m)}
                            </div>
                        </div>
                    `;
                });
            }

            // Add New Button
            btnAddNew.addEventListener('click', () => { 
                overlay.style.display = 'flex'; 
                resetForm(); 
            });

            btnClose.addEventListener('click', () => { overlay.style.display = 'none'; });
            btnCancel.addEventListener('click', () => { overlay.style.display = 'none'; });
            
            btnBackToMain.addEventListener('click', () => {
                overlay.style.display = 'none';
                resetForm();
            });

            // Copy Link
            btnCopyLink.addEventListener('click', () => {
                embedLinkInput.select();
                document.execCommand('copy');
                btnCopyLink.textContent = "Copied!";
                btnCopyLink.classList.replace('bg-yellow-500', 'bg-green-500');
                showToast("✅ Copied! Now replace the Notion embed link.");
                setTimeout(() => {
                    btnCopyLink.textContent = "Copy";
                    btnCopyLink.classList.replace('bg-green-500', 'bg-yellow-500');
                }, 2000);
            });

            // Save Action
            btnSave.addEventListener('click', () => {
                const title = inputTitle.value.trim();
                const date = inputDate.value;
                const editId = inputId.value;

                if (!title || !date) return showToast("⚠️ Title and date are required!");
                
                if (editId) { 
                    const idx = events.findIndex(e => e.id === editId); 
                    if (idx !== -1) events[idx] = { id: editId, title, date }; 
                } else { 
                    events.push({ id: Date.now().toString(), title, date }); 
                }
                
                saveDataLocally();
                renderBanners();
                
                // Show the copy link alert instead of closing
                triggerSaveRequirement();
            });

            // Edit / Delete (Delegated)
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                
                const action = btn.getAttribute('data-action');
                const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        modalTitle.textContent = "Edit Event";
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        btnSave.textContent = "Update"; 
                        btnCancel.classList.remove('hidden'); 
                        overlay.style.display = 'flex';
                    }
                } else if (action === 'delete') {
                    events = events.filter(e => e.id !== id); 
                    saveDataLocally();
                    renderBanners();
                    
                    // Force them to copy new link after deleting
                    overlay.style.display = 'flex';
                    resetForm();
                    modalTitle.textContent = "Event Deleted";
                    triggerSaveRequirement();
                }
            });

            if (events.length === 0 && !urlData) { 
                const nextWeek = new Date(); 
                nextWeek.setDate(nextWeek.getDate() + 7);
                // Format YYYY-MM-DD
                const dateStr = nextWeek.toISOString().split('T')[0];
                events.push({ id: 'demo1', title: 'Example Event (Delete Me)', date: dateStr }); 
                saveDataLocally(); 
            }
            
            renderBanners();
            // Update every minute is enough since we only show minutes, but running every 1s is fine too for precision
            tickInterval = setInterval(updateTicks, 1000); 
        });
    </script>
</body>
</html>
