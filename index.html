<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Countdown Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Helvetica', '"Apple Color Emoji"', 'Arial', 'sans-serif', '"Segoe UI Emoji"', '"Segoe UI Symbol"'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-breathe { animation: breathe 3.5s ease-in-out infinite; display: inline-block; }
        
        /* 藍色流動光線動畫 */
        .flowing-line {
            width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, #3b82f6, transparent);
            background-size: 100% 200%;
            animation: flowDown 1.5s linear infinite; opacity: 0.7;
        }
        @keyframes flowDown { 0% { background-position: 0 -100%; } 100% { background-position: 0 100%; } }
    </style>
</head>
<body class="bg-transparent text-gray-800 dark:text-gray-200 antialiased min-h-screen w-full flex flex-col items-center p-2 sm:p-4 m-0 overflow-y-auto no-scrollbar relative">

    <!-- 全螢幕 Loading -->
    <div id="global-loading" class="fixed inset-0 bg-white/80 dark:bg-[#191919]/80 backdrop-blur-sm z-[200] flex flex-col items-center justify-center transition-opacity duration-300">
        <svg class="animate-spin h-8 w-8 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span class="text-sm font-medium text-gray-500" id="loading-text">Connecting to Cloud...</span>
    </div>

    <div id="events-container" class="w-full max-w-2xl space-y-3 flex flex-col"></div>

    <div class="w-full max-w-2xl mt-2 opacity-0 hover:opacity-100 transition-opacity duration-300 flex justify-center py-3 relative group cursor-pointer" id="btn-add-new">
        <div class="absolute inset-0 border-2 border-dashed border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-lg pointer-events-none transition-colors duration-300"></div>
        <button class="bg-gray-100 dark:bg-[#202020] hover:bg-blue-50 dark:hover:bg-blue-900/30 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 rounded-full p-2.5 shadow-sm transition-colors border border-gray-200 dark:border-gray-700 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1e1e1e] w-full max-w-md rounded-xl shadow-2xl flex flex-col overflow-hidden relative fade-in transition-all">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 id="modal-title" class="text-lg font-semibold">Add Event</h2>
                <button id="btn-close-modal" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 p-1 cursor-pointer transition-colors rounded">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="p-5 bg-gray-50 dark:bg-[#252525]">
                <input type="hidden" id="edit-id" value="">
                <input type="hidden" id="current-bg" value="">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Event Title</label>
                        <input type="text" id="input-title" placeholder="e.g., Trip to Tokyo" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Date</label>
                        <input type="date" id="input-date" lang="en-US" class="w-full px-3 py-2.5 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow [color-scheme:light] dark:[color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Background Image (Optional)</label>
                        <input type="file" id="input-image" accept="image/*" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-xs text-gray-500 focus:outline-none file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                    
                    <!-- 新增：圖片位置選擇器 (預設隱藏) -->
                    <div id="image-pos-container" class="hidden">
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Image Position / Focus</label>
                        <select id="input-bg-pos" class="w-full px-3 py-2 bg-white dark:bg-[#191919] border border-gray-300 dark:border-gray-700 rounded-md text-sm text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-shadow">
                            <option value="center">Center (Default)</option>
                            <option value="top">Top (Show upper part)</option>
                            <option value="bottom">Bottom (Show lower part)</option>
                        </select>
                    </div>

                    <div class="flex gap-2 pt-3">
                        <button id="btn-save" class="flex-1 bg-gray-900 dark:bg-gray-200 hover:bg-black dark:hover:bg-white text-white dark:text-black font-semibold py-2.5 px-4 rounded-md text-sm transition-colors shadow-sm cursor-pointer flex justify-center items-center gap-2">Save Event</button>
                        <button id="btn-cancel" class="hidden px-4 py-2.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-md text-sm font-medium transition-colors shadow-sm cursor-pointer">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-[200]">
        Notification
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let events = [];
            let isPreviewSandbox = false;
            let supabase = null;
            
            const container = document.getElementById('events-container');
            const btnAddNew = document.getElementById('btn-add-new');
            const overlay = document.getElementById('modal-overlay');
            const btnClose = document.getElementById('btn-close-modal');
            const modalTitle = document.getElementById('modal-title');
            
            const inputTitle = document.getElementById('input-title');
            const inputDate = document.getElementById('input-date');
            const inputImage = document.getElementById('input-image');
            const inputId = document.getElementById('edit-id');
            const inputCurrentBg = document.getElementById('current-bg');
            const inputBgPos = document.getElementById('input-bg-pos');
            const imagePosContainer = document.getElementById('image-pos-container');
            
            const btnSave = document.getElementById('btn-save');
            const btnCancel = document.getElementById('btn-cancel');
            const toast = document.getElementById('toast');
            const globalLoading = document.getElementById('global-loading');

            // --- 極限防卡死系統 (專為沙盒預覽而設) ---
            const sandboxTimeout = setTimeout(() => {
                if (!globalLoading.classList.contains('opacity-0')) {
                    isPreviewSandbox = true;
                    globalLoading.classList.add('opacity-0', 'pointer-events-none');
                    showToast("⚠️ 沙盒預覽模式：顯示 Demo 數據。");
                    
                    const demoDate = new Date(); demoDate.setDate(demoDate.getDate() + 14);
                    events = [
                        // 加入 #top 去示範位置功能
                        { id: 'demo1', title: 'Japan Trip (Demo - Top Focus)', date: demoDate.toISOString().split('T')[0], bg_url: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800&auto=format&fit=crop#top' },
                        { id: 'demo2', title: 'Product Launch', date: new Date().toISOString().split('T')[0], bg_url: '' }
                    ];
                    renderBanners();
                }
            }, 1500);

            try {
                if (typeof window.supabase !== 'undefined') {
                    const supabaseUrl = 'https://umizdhuywxoeyeymmmqf.supabase.co';
                    const supabaseKey = 'sb_publishable_ASDhJjynsmY1Hz9mAERzxg_EsvUaRpL';
                    supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                }
            } catch (e) {
                console.warn("Supabase init blocked by sandbox.");
            }

            // 監聽圖片上傳，如果有圖就顯示位置選項
            inputImage.addEventListener('change', function() {
                if (this.files.length > 0) {
                    imagePosContainer.classList.remove('hidden');
                } else if (!inputCurrentBg.value) {
                    imagePosContainer.classList.add('hidden');
                }
            });

            function calcDaysLeft(dateStr) {
                const today = new Date(); today.setHours(0, 0, 0, 0); 
                const target = new Date(dateStr); target.setHours(0, 0, 0, 0);
                return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            }

            function showToast(msg) { 
                toast.textContent = msg; 
                toast.classList.remove('opacity-0', 'translate-y-4'); 
                setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 4000); 
            }

            function resetModal() {
                inputTitle.value = ""; inputDate.value = ""; inputImage.value = ""; 
                inputId.value = ""; inputCurrentBg.value = ""; inputBgPos.value = "center";
                imagePosContainer.classList.add('hidden');
                modalTitle.textContent = "Add Event"; btnSave.innerHTML = "Save Event"; 
                btnSave.disabled = false; btnCancel.classList.add('hidden');
            }

            async function fetchEvents() {
                if (!supabase) return; 
                try {
                    const { data, error } = await supabase.from('events').select('*');
                    clearTimeout(sandboxTimeout);
                    if (error) throw error;
                    events = data || [];
                    events.sort((a, b) => new Date(a.date) - new Date(b.date));
                    renderBanners();
                    globalLoading.classList.add('opacity-0', 'pointer-events-none');
                } catch (err) {
                    console.error("Fetch error:", err);
                }
            }

            function renderBanners() {
                container.innerHTML = '';
                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-[#191919] border border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center text-gray-500 text-sm fade-in">
                            No events yet. Click below to add your first one!
                        </div>
                    `;
                    return;
                }
                events.forEach(ev => {
                    const days = calcDaysLeft(ev.date);
                    let numDisplay = "", labelDisplay = "", colorClass = "";
                    if (days > 0) { numDisplay = days; labelDisplay = days === 1 ? "Day" : "Days"; colorClass = ev.bg_url ? "text-white" : "text-gray-900 dark:text-white"; } 
                    else if (days === 0) { numDisplay = "0"; labelDisplay = "Today"; colorClass = ev.bg_url ? "text-green-300" : "text-green-600 dark:text-green-500"; } 
                    else { numDisplay = Math.abs(days); labelDisplay = "Days Ago"; colorClass = ev.bg_url ? "text-gray-300" : "text-gray-400 dark:text-gray-500"; }

                    const row = document.createElement('div');
                    let bgStyle = "", innerContainerClass = "bg-gray-50/50 dark:bg-[#202020]/50", titleColorClass = "text-gray-800 dark:text-gray-200", labelColorClass = "text-gray-500 dark:text-gray-400";
                    
                    if (ev.bg_url) {
                        // 處理圖片位置 Hash (#top, #center, #bottom)
                        let actualUrl = ev.bg_url.split('#')[0];
                        let pos = ev.bg_url.split('#')[1] || 'center';
                        
                        bgStyle = `background-image: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.2) 100%), url('${actualUrl}'); background-size: cover; background-position: center ${pos};`;
                        innerContainerClass = "bg-transparent"; titleColorClass = "text-white drop-shadow-md"; labelColorClass = "text-gray-300";
                    }

                    row.className = "group relative flex items-stretch bg-white dark:bg-[#191919] border border-gray-200 dark:border-gray-800 rounded-lg shadow-sm overflow-hidden transition-all duration-300 hover:shadow-md fade-in min-h-[4rem]";
                    row.style = bgStyle;
                    row.innerHTML = `
                        <div class="flex-shrink-0 w-28 sm:w-36 ${innerContainerClass} ${ev.bg_url ? '' : 'border-r border-gray-200 dark:border-gray-800'} p-3 flex items-center justify-center transition-colors relative z-10">
                            <div class="flex items-baseline gap-1.5 animate-breathe"><span class="text-2xl sm:text-3xl font-bold tabular-nums tracking-tight ${colorClass}">${numDisplay}</span><span class="text-[11px] sm:text-xs font-semibold uppercase tracking-widest ${labelColorClass} mb-1">${labelDisplay}</span></div>
                        </div>
                        <div class="flex-shrink-0 relative z-10 flex items-center h-full"><div class="flowing-line"></div></div>
                        <div class="flex-grow p-4 flex flex-col justify-center overflow-hidden relative z-10"><span class="font-semibold text-base sm:text-lg ${titleColorClass} truncate pr-16">${ev.title}</span></div>
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20">
                            <button data-action="edit" data-id="${ev.id}" class="p-2 bg-white/90 dark:bg-[#252525]/90 backdrop-blur shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/50 cursor-pointer transition-colors focus:outline-none">✎</button>
                            <button data-action="delete" data-id="${ev.id}" class="p-2 bg-white/90 dark:bg-[#252525]/90 backdrop-blur shadow-sm border border-gray-200 dark:border-gray-700 rounded-md text-red-500 hover:bg-red-50 dark:hover:bg-red-900/50 cursor-pointer transition-colors focus:outline-none">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }

            btnAddNew.addEventListener('click', () => { resetModal(); overlay.style.display = 'flex'; });
            const closeModal = () => { overlay.style.display = 'none'; };
            btnClose.addEventListener('click', closeModal); btnCancel.addEventListener('click', closeModal);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

            btnSave.addEventListener('click', async () => {
                if (isPreviewSandbox) return showToast("⚠️ 預覽模式無法儲存。請將 Code 放上 GitHub 測試！");

                const title = inputTitle.value.trim(); const date = inputDate.value; const file = inputImage.files[0];
                const editId = inputId.value; let finalBgUrl = inputCurrentBg.value;
                const pos = inputBgPos.value;

                if (!title || !date) return showToast("⚠️ Please enter a title and date!");

                btnSave.disabled = true;
                btnSave.innerHTML = `Saving...`;
                
                try {
                    if (file) {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                        const { data: uploadData, error: uploadError } = await supabase.storage.from('backgrounds').upload(fileName, file);
                        if (uploadError) throw uploadError;
                        const { data: publicUrlData } = supabase.storage.from('backgrounds').getPublicUrl(fileName);
                        finalBgUrl = publicUrlData.publicUrl;
                    }
                    
                    // 組合位置資訊到 URL 尾部
                    if (finalBgUrl) {
                        finalBgUrl = finalBgUrl.split('#')[0] + '#' + pos;
                    }

                    const eventData = { id: editId || Date.now().toString(), title: title, date: date, bg_url: finalBgUrl || null };
                    const { error: dbError } = await supabase.from('events').upsert([eventData]);
                    
                    if (dbError) throw dbError;
                    
                    showToast("✅ Event saved!");
                    closeModal();
                    fetchEvents();
                } catch (err) {
                    console.error(err);
                    showToast("⚠️ Error: " + err.message);
                    btnSave.disabled = false;
                    btnSave.innerHTML = "Save Event";
                }
            });

            container.addEventListener('click', async (e) => {
                const btn = e.target.closest('button'); if (!btn) return;
                const action = btn.getAttribute('data-action'); const id = btn.getAttribute('data-id');

                if (action === 'edit') {
                    const ev = events.find(e => e.id === id);
                    if (ev) { 
                        resetModal(); 
                        modalTitle.textContent = "Edit Event"; 
                        inputTitle.value = ev.title; 
                        inputDate.value = ev.date; 
                        inputId.value = ev.id; 
                        
                        // 分拆 URL 同位置資訊
                        let currentBg = ev.bg_url || "";
                        let pos = "center";
                        if (currentBg.includes('#')) {
                            pos = currentBg.split('#')[1];
                            currentBg = currentBg.split('#')[0];
                        }
                        
                        inputCurrentBg.value = currentBg; 
                        inputBgPos.value = pos;
                        
                        if (currentBg) {
                            imagePosContainer.classList.remove('hidden');
                        }
                        
                        btnSave.textContent = "Save Changes"; btnCancel.classList.remove('hidden'); overlay.style.display = 'flex';
                    }
                } else if (action === 'delete' && confirm("Delete this event?")) {
                    if (isPreviewSandbox) return showToast("⚠️ 預覽模式無法刪除。");
                    const { error } = await supabase.from('events').delete().eq('id', id);
                    if(error) showToast("⚠️ Failed to delete."); else { showToast("✅ Event deleted."); fetchEvents(); }
                }
            });

            fetchEvents();
        });
    </script>
</body>
</html>
